<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qadam Cargo — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3a;
    --green-light: #25913f;
    --green-dark: #0f3d21;
    --yellow: #f5c518;
    --yellow-light: #ffd740;
    --white: #f8faf8;
    --gray: #e8ede9;
    --gray2: #c5d0c7;
    --text: #0f1f12;
    --text2: #4a6350;
    --red: #d63031;
    --blue: #0984e3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--green-dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--green-dark);
    border-bottom: 3px solid var(--yellow);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo span { color: var(--yellow); }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--yellow);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-time {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    color: var(--yellow);
    opacity: 0.8;
  }

  /* MAIN */
  main {
    flex: 1;
    background: var(--white);
    border-radius: 20px 20px 0 0;
    margin-top: 8px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* STATS ROW */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .stat-card {
    background: var(--green-dark);
    border-radius: 14px;
    padding: 16px;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 70px; height: 70px;
    background: rgba(245,197,24,0.12);
    border-radius: 50%;
  }

  .stat-card .num {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--yellow);
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 11px;
    color: var(--gray2);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* SEARCH BAR */
  .search-wrap {
    display: flex;
    gap: 10px;
  }

  .search-box {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--green-dark);
    border-radius: 12px;
    padding: 0 16px;
    gap: 12px;
    border: 2px solid transparent;
    transition: border 0.2s;
  }

  .search-box:focus-within { border-color: var(--yellow); }

  .search-box .icon { font-size: 20px; opacity: 0.6; }

  .search-box input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--white);
    font-family: 'Golos Text', sans-serif;
    font-size: 16px;
    padding: 14px 0;
    letter-spacing: 1px;
  }

  .search-box input::placeholder { color: var(--gray2); opacity: 0.6; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 20px;
    height: 52px;
    border-radius: 12px;
    font-family: 'Golos Text', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .btn-yellow {
    background: var(--yellow);
    color: var(--green-dark);
  }

  .btn-yellow:hover { background: var(--yellow-light); transform: translateY(-1px); }

  .btn-green {
    background: var(--green-light);
    color: var(--white);
  }

  .btn-green:hover { background: var(--green); transform: translateY(-1px); }

  .btn-ghost {
    background: var(--gray);
    color: var(--text2);
  }

  .btn-ghost:hover { background: var(--gray2); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--gray);
    padding: 5px;
    border-radius: 12px;
    width: fit-content;
  }

  .tab {
    padding: 8px 18px;
    border-radius: 9px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text2);
    font-family: 'Golos Text', sans-serif;
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--green-dark);
    color: var(--yellow);
  }

  /* TABLE */
  .table-wrap {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    border: 1.5px solid var(--gray);
    flex: 1;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--green-dark);
  }

  thead th {
    padding: 14px 16px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--yellow);
    text-align: left;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  tbody tr {
    border-bottom: 1px solid var(--gray);
    transition: background 0.1s;
  }

  tbody tr:hover { background: #f0f7f1; }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 13px 16px;
    font-size: 14px;
    color: var(--text);
    vertical-align: middle;
  }

  .track-code {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    color: var(--green-dark);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-transit { background: #fff3cd; color: #856404; }
  .badge-arrived { background: #d1f0d9; color: var(--green-dark); }
  .badge-issued  { background: #e2e3e5; color: #495057; }
  .badge-new     { background: #cce5ff; color: #004085; }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .action-btn {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: 'Golos Text', sans-serif;
    transition: all 0.15s;
  }

  .action-btn:hover { transform: translateY(-1px); }

  /* MODAL */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(10,30,15,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-bg.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--white);
    border-radius: 20px;
    padding: 28px;
    width: 480px;
    max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: translateY(20px);
    transition: transform 0.2s;
  }

  .modal-bg.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-title span {
    background: var(--yellow);
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .form-group input, .form-group select {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--gray);
    border-radius: 10px;
    font-family: 'Golos Text', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: white;
    outline: none;
    transition: border 0.15s;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--green-light);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  /* SEARCH RESULT HIGHLIGHT */
  .highlight-row { 
    background: #fffbea !important;
    outline: 2px solid var(--yellow);
    outline-offset: -2px;
  }

  /* NOTIFICATION */
  .notif {
    position: fixed;
    top: 80px; right: 20px;
    background: var(--green-dark);
    color: var(--yellow);
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    z-index: 999;
    border-left: 4px solid var(--yellow);
    transform: translateX(200%);
    transition: transform 0.3s;
    font-family: 'Golos Text', sans-serif;
  }

  .notif.show { transform: translateX(0); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text2);
  }

  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr; }
    main { padding: 16px; }
    thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    QADAM <span>CARGO</span>
  </div>
  <div class="header-time" id="clock"></div>
</header>

<main>
  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="stat-total">0</div>
      <div class="lbl">Всего посылок</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-transit">0</div>
      <div class="lbl">В пути</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-arrived">0</div>
      <div class="lbl">На складе</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-issued">0</div>
      <div class="lbl">Выдано</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Введите или сканируйте трек-код..." oninput="searchTrack()" />
    </div>
    <button class="btn btn-green" onclick="document.getElementById('xlsxInput').click()">📥 Импорт Excel</button>
    <input type="file" id="xlsxInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(event)" />
    <button class="btn btn-yellow" onclick="openAddModal()">➕ Добавить посылку</button>
  </div>

  <!-- TABS -->
  <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
    <div class="tabs">
      <button class="tab active" onclick="filterTab('all', this)">Все</button>
      <button class="tab" onclick="filterTab('transit', this)">В пути</button>
      <button class="tab" onclick="filterTab('arrived', this)">На складе</button>
      <button class="tab" onclick="filterTab('issued', this)">Выдано</button>
    </div>
    <span style="font-size:13px; color:var(--text2); margin-left:auto;" id="count-label"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Трек-код</th>
          <th>Клиент</th>
          <th>Телефон</th>
          <th>Вес (кг)</th>
          <th>Сумма (сом)</th>
          <th>Статус</th>
          <th>Дата</th>
          <th>Действие</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none;">
      <div class="icon">📭</div>
      <p>Посылок не найдено</p>
    </div>
  </div>
</main>

<!-- ADD MODAL -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <div class="modal-title"><span>➕</span> Новая посылка</div>
    <div class="form-group">
      <label>Трек-код *</label>
      <input type="text" id="f-track" placeholder="Например: JT1234567890CN" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Имя клиента *</label>
        <input type="text" id="f-name" placeholder="Айгуль" />
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="text" id="f-phone" placeholder="+996 700 000 000" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Вес (кг)</label>
        <input type="number" id="f-weight" placeholder="0.5" step="0.1" min="0" />
      </div>
      <div class="form-group">
        <label>Статус</label>
        <select id="f-status">
          <option value="transit">В пути</option>
          <option value="arrived">На складе</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Комментарий</label>
      <input type="text" id="f-comment" placeholder="Хрупкое, большой размер..." />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Отмена</button>
      <button class="btn btn-yellow" onclick="addParcel()">Добавить</button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-bg" id="viewModal">
  <div class="modal">
    <div class="modal-title"><span>📦</span> Информация о посылке</div>
    <div id="viewContent"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('viewModal')">Закрыть</button>
      <button class="btn btn-green" id="issueBtn" onclick="issueParcel()">✅ Отметить как выдано</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-title"><span>✏️</span> Редактировать посылку</div>
    <div class="form-group">
      <label>Трек-код</label>
      <input type="text" id="e-track" disabled style="opacity:0.6;cursor:not-allowed" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Имя клиента</label>
        <input type="text" id="e-name" placeholder="Айгуль" />
      </div>
      <div class="form-group">
        <label>Телефон</label>
        <input type="text" id="e-phone" placeholder="+996 700 000 000" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Вес (кг)</label>
        <input type="number" id="e-weight" placeholder="0.5" step="0.1" min="0" />
      </div>
      <div class="form-group">
        <label>Статус</label>
        <select id="e-status">
          <option value="transit">В пути</option>
          <option value="arrived">На складе</option>
          <option value="issued">Выдано</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Комментарий</label>
      <input type="text" id="e-comment" placeholder="Хрупкое, большой размер..." />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">Отмена</button>
      <button class="btn btn-yellow" onclick="saveEdit()">💾 Сохранить</button>
    </div>
  </div>
</div>

<!-- WHATSAPP MODAL -->
<div class="modal-bg" id="waModal">
  <div class="modal">
    <div class="modal-title"><span style="background:#25D366">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </span> WhatsApp уведомление</div>

    <div style="font-size:12px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;font-weight:600;letter-spacing:.5px">Выбери шаблон</div>

    <div id="waTemplates" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px"></div>

    <div class="form-group">
      <label>Текст сообщения</label>
      <textarea id="waText" rows="5" style="width:100%;padding:11px 14px;border:2px solid var(--gray);border-radius:10px;font-family:'Golos Text',sans-serif;font-size:14px;resize:vertical;outline:none;line-height:1.5" onfocus="this.style.borderColor='var(--green-light)'" onblur="this.style.borderColor='var(--gray)'"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('waModal')">Отмена</button>
      <button class="btn" style="background:#25D366;color:white" onclick="openWhatsApp()">
        Открыть WhatsApp →
      </button>
    </div>
  </div>
</div>
<div class="modal-bg" id="importModal">
  <div class="modal" style="width:540px">
    <div class="modal-title"><span>📥</span> Импорт трек-кодов</div>
    <div id="importPreview" style="max-height:280px;overflow-y:auto;margin-bottom:16px"></div>
    <div id="importInfo" style="font-size:13px;color:var(--text2);margin-bottom:4px"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('importModal')">Отмена</button>
      <button class="btn btn-yellow" onclick="confirmImport()">✅ Загрузить все</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// DATA — in-memory (no localStorage)
let parcels = [
  { id: 1, track: 'JT8823419201CN', name: 'Айгуль Бакытова', phone: '+996 700 123 456', weight: 2.3, status: 'arrived', date: '2025-05-17', comment: 'Одежда' },
  { id: 2, track: 'SF1234567890',   name: 'Бакыт Орозов',    phone: '+996 555 987 654', weight: 5.1, status: 'transit', date: '2025-05-16', comment: '' },
  { id: 3, track: 'YT9988776655',   name: 'Нурия Сейтова',   phone: '+996 770 111 222', weight: 1.0, status: 'arrived', date: '2025-05-15', comment: 'Хрупкое' },
  { id: 4, track: 'JT0011223344CN', name: 'Максат Джумалиев',phone: '+996 708 333 444', weight: 3.7, status: 'issued',  date: '2025-05-13', comment: '' },
];

let currentFilter = 'all';
let currentViewId = null;

function save() {
  updateStats();
  render();
}

function updateStats() {
  document.getElementById('stat-total').textContent = parcels.length;
  document.getElementById('stat-transit').textContent = parcels.filter(p => p.status === 'transit').length;
  document.getElementById('stat-arrived').textContent = parcels.filter(p => p.status === 'arrived').length;
  document.getElementById('stat-issued').textContent = parcels.filter(p => p.status === 'issued').length;
}

const statusMap = {
  transit: { label: 'В пути', cls: 'badge-transit' },
  arrived: { label: 'На складе', cls: 'badge-arrived' },
  issued:  { label: 'Выдано',   cls: 'badge-issued'  },
  new:     { label: 'Новый',    cls: 'badge-new'      },
};

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = parcels;
  if (currentFilter !== 'all') list = list.filter(p => p.status === currentFilter);
  if (q) list = list.filter(p =>
    p.track.toLowerCase().includes(q) ||
    p.name.toLowerCase().includes(q) ||
    (p.phone && p.phone.includes(q))
  );
  return list;
}

function searchTrack() { render(); }

function filterTab(f, el) {

// ADD
function openAddModal() {
  ['f-track','f-name','f-phone','f-weight','f-comment'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'transit';
  openModal('addModal');
}

function addParcel() {
  const track = document.getElementById('f-track').value.trim().toUpperCase();
  const name  = document.getElementById('f-name').value.trim();
  if (!track || !name) { showNotif('⚠️ Заполните трек-код и имя!'); return; }
  if (parcels.find(p => p.track === track)) { showNotif('⚠️ Такой трек уже есть!'); return; }

  const today = new Date().toISOString().split('T')[0];
  parcels.unshift({
    id: Date.now(),
    track,
    name,
    phone:   document.getElementById('f-phone').value.trim(),
    weight:  parseFloat(document.getElementById('f-weight').value) || null,
    status:  document.getElementById('f-status').value,
    date:    today,
    comment: document.getElementById('f-comment').value.trim(),
  });
  save();
  closeModal('addModal');
  showNotif('✅ Посылка добавлена!');
}

function issueParcel() {
  const p = parcels.find(x => x.id === currentViewId);

  p.status = 'issued';

  closeModal('viewModal');
  showNotif('✅ Посылка отмечена как выданная!');
}

function sendWA(id) {
  const p = parcels.find(x => x.id === id);

  // Render template buttons
  document.getElementById('waTemplates').innerHTML = waTemplates.map((t, i) =>

  document.getElementById('waText').value = waTemplates[0].text(p);

function selectWATemplate(id, idx) {
  const p = parcels.find(x => x.id === id);
  if (!p) return;
  document.getElementById('waText').value = waTemplates[idx].text(p);

  document.querySelectorAll('#waTemplates button').forEach((b, i) => {
    b.style.borderColor = i === idx ? '#25D366' : 'var(--gray)';
    b.style.background  = i === idx ? '#f0fff4' : 'white';
  });
}

function openWhatsApp() {
  const p = parcels.find(x => x.id === waParcelId);
  if (!p) return;
  const phone = p.phone.replace(/\D/g, ''); // strip non-digits
  const text  = document.getElementById('waText').value;
  const url   = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
  closeModal('waModal');
  showNotif('📱 WhatsApp открыт!');
}

// EDIT
let editId = null;
function openEditModal(id) {
  const p = parcels.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('e-track').value  = p.track;
  document.getElementById('e-name').value   = p.name || '';
  document.getElementById('e-phone').value  = p.phone || '';
  document.getElementById('e-weight').value = p.weight || '';
  document.getElementById('e-status').value = p.status;
  document.getElementById('e-comment').value= p.comment || '';

}

function saveEdit() {
  const p = parcels.find(x => x.id === editId);
  if (!p) return;
  p.name    = document.getElementById('e-name').value.trim();
  p.phone   = document.getElementById('e-phone').value.trim();
  p.weight  = parseFloat(document.getElementById('e-weight').value) || null;
  p.status  = document.getElementById('e-status').value;
  p.comment = document.getElementById('e-comment').value.trim();
  save();
  closeModal('editModal');
  showNotif('✅ Данные сохранены!');
}

// IMPORT EXCEL / CSV
let pendingImport = [];

function importExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  const reader = new FileReader();

  if (file.name.endsWith('.csv')) {
    reader.onload = e => parseCSV(e.target.result);
    reader.readAsText(file, 'UTF-8');
  } else {
    // xlsx/xls — read as binary, parse manually (simple approach)
    reader.onload = e => parseXLSXSimple(e.target.result);
    reader.readAsBinaryString(file);
  }
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const tracks = [];
  lines.forEach(line => {
    // grab first non-empty cell
    const cells = line.split(/[,;\t]/);
    const val = cells[0].replace(/["']/g, '').trim().toUpperCase();
    if (val && val.length > 4) tracks.push(val);
  });
  showImportPreview(tracks);
}

function parseXLSXSimple(binary) {
  // Extract readable strings that look like track codes (alphanumeric, 8-30 chars)
  const tracks = [];
  const seen = new Set();
  // Scan for strings in xlsx binary (shared strings are plain text in zip)
  const matches = binary.match(/[A-Z0-9]{8,30}/g) || [];
  matches.forEach(m => {
    if (!seen.has(m) && /[A-Z]/.test(m) && /[0-9]/.test(m)) {
      seen.add(m);
      tracks.push(m);
    }
  });
  showImportPreview(tracks.slice(0, 200));
}

function showImportPreview(tracks) {
  const today = new Date().toISOString().split('T')[0];
  const existing = new Set(parcels.map(p => p.track));
  const newTracks = tracks.filter(t => !existing.has(t));
  const dupTracks  = tracks.filter(t => existing.has(t));

  pendingImport = newTracks;

  const previewHTML = newTracks.slice(0, 50).map(t =>
    `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray)">
      <span style="font-family:'Unbounded',sans-serif;font-size:12px;color:var(--green-dark);font-weight:700">${t}</span>
      <span class="badge badge-transit" style="margin-left:auto">В пути</span>
    </div>`
  ).join('') + (newTracks.length > 50 ? `<div style="padding:8px;color:var(--text2);font-size:13px">...и ещё ${newTracks.length - 50} трек-кодов</div>` : '');

  document.getElementById('importPreview').innerHTML = previewHTML ||
    '<div style="padding:20px;text-align:center;color:var(--text2)">Трек-коды не найдены</div>';

  document.getElementById('importInfo').innerHTML =
    `<b style="color:var(--green-dark)">${newTracks.length}</b> новых трек-кодов будет добавлено` +
    (dupTracks.length ? ` · <span style="color:var(--text2)">${dupTracks.length} уже есть — пропущены</span>` : '');

  openModal('importModal');
}

function confirmImport() {
  if (!pendingImport.length) { closeModal('importModal'); return; }
  const today = new Date().toISOString().split('T')[0];
  const newParcels = pendingImport.map(track => ({
    id: Date.now() + Math.random(),
    track,
    name: '',
    phone: '',
    weight: null,
    status: 'transit',
    date: today,
    comment: '',
  }));
  parcels = [...newParcels, ...parcels];
  save();
  closeModal('importModal');
  pendingImport = [];
  showNotif(`✅ Загружено ${newParcels.length} трек-кодов!`);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
