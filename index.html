<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qadam Cargo — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gd:#0f3d21;--gl:#25913f;--y:#f5c518;--yl:#ffd740;--w:#f8faf8;--gr:#e8ede9;--gr2:#c5d0c7;--t:#0f1f12;--t2:#4a6350;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Golos Text',sans-serif;background:var(--gd);color:var(--t);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--gd);border-bottom:3px solid var(--y);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;color:var(--w);display:flex;align-items:center;gap:8px;}
.logo span{color:var(--y);}
.logo-icon{width:34px;height:34px;background:var(--y);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.clock{font-family:'Unbounded',sans-serif;font-size:13px;color:var(--y);opacity:.8;}
main{flex:1;background:var(--w);border-radius:20px 20px 0 0;margin-top:8px;padding:16px;display:flex;flex-direction:column;gap:14px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat{background:var(--gd);border-radius:12px;padding:14px;color:var(--w);}
.stat .num{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:700;color:var(--y);line-height:1;}
.stat .lbl{font-size:10px;color:var(--gr2);margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}
.page-tabs{display:flex;gap:4px;background:var(--gr);padding:4px;border-radius:10px;width:fit-content;}
.page-tab{padding:8px 20px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;border:none;background:none;color:var(--t2);font-family:'Golos Text',sans-serif;transition:all .15s;}
.page-tab.active{background:var(--gd);color:var(--y);}
.page{display:none;}.page.active{display:flex;flex-direction:column;gap:12px;}
.sw{display:flex;gap:8px;flex-wrap:wrap;}
.sbox{flex:1;min-width:200px;display:flex;align-items:center;background:var(--gd);border-radius:10px;padding:0 14px;gap:10px;border:2px solid transparent;transition:border .2s;}
.sbox:focus-within{border-color:var(--y);}
.sbox input{flex:1;background:none;border:none;outline:none;color:var(--w);font-family:'Golos Text',sans-serif;font-size:15px;padding:12px 0;}
.sbox input::placeholder{color:var(--gr2);opacity:.6;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:46px;border-radius:10px;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.by{background:var(--y);color:var(--gd);} .by:hover{background:var(--yl);}
.bg{background:var(--gl);color:#fff;} .bg:hover{background:#1a7a33;}
.bgh{background:var(--gr);color:var(--t2);}
.ftabs{display:flex;gap:4px;background:var(--gr);padding:4px;border-radius:10px;width:fit-content;}
.tab{padding:6px 14px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;border:none;background:none;color:var(--t2);font-family:'Golos Text',sans-serif;transition:all .15s;}
.tab.active{background:var(--gd);color:var(--y);}
.tw{background:#fff;border-radius:14px;overflow:hidden;border:1.5px solid var(--gr);overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:700px;}
thead{background:var(--gd);}
thead th{padding:11px 13px;font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;color:var(--y);text-align:left;letter-spacing:.5px;text-transform:uppercase;}
tbody tr{border-bottom:1px solid var(--gr);transition:background .1s;}
tbody tr:hover{background:#f0f7f1;}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:10px 13px;font-size:13px;color:var(--t);vertical-align:middle;}
.trk{font-family:'Unbounded',sans-serif;font-size:10px;color:var(--gd);font-weight:600;letter-spacing:.3px;word-break:break-all;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
.bt{background:#fff3cd;color:#856404;}
.ba{background:#d1f0d9;color:var(--gd);}
.bi{background:#e2e3e5;color:#495057;}
.abt{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.ab{padding:5px 9px;border-radius:7px;font-size:12px;cursor:pointer;border:none;font-family:'Golos Text',sans-serif;transition:all .15s;}
.ab:hover{transform:translateY(-1px);}
.empty{text-align:center;padding:40px 20px;color:var(--t2);}
.empty .icon{font-size:40px;margin-bottom:10px;}
.modal-bg{position:fixed;inset:0;background:rgba(10,30,15,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal{background:var(--w);border-radius:18px;padding:24px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3);transform:translateY(20px);transition:transform .2s;}
.modal-bg.open .modal{transform:translateY(0);}
.mt{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--gd);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.mt span{background:var(--y);width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:2px solid var(--gr);border-radius:9px;font-family:'Golos Text',sans-serif;font-size:14px;color:var(--t);background:#fff;outline:none;transition:border .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gl);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ma{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
.notif{position:fixed;top:68px;right:16px;background:var(--gd);color:var(--y);padding:10px 16px;border-radius:10px;font-weight:600;font-size:13px;z-index:999;border-left:4px solid var(--y);transform:translateX(200%);transition:transform .3s;font-family:'Golos Text',sans-serif;}
.notif.show{transform:translateX(0);}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;}
.cc{background:#fff;border-radius:12px;padding:13px 15px;border:1.5px solid var(--gr);display:flex;align-items:center;gap:11px;transition:all .15s;cursor:pointer;}
.cc:hover{border-color:var(--gl);background:#f5fbf6;}
.cav{width:38px;height:38px;border-radius:50%;background:var(--gd);display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--y);flex-shrink:0;}
.cn{font-weight:600;font-size:14px;color:var(--gd);}
.cp{font-size:12px;color:var(--t2);margin-top:2px;}
.ccode{font-family:'Unbounded',sans-serif;font-size:9px;color:var(--gr2);margin-top:1px;}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);} .fr{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">📦</div>QADAM <span>CARGO</span></div>
  <div class="clock" id="clock"></div>
</header>
<main>
  <div class="stats">
    <div class="stat"><div class="num" id="s-all">0</div><div class="lbl">Всего посылок</div></div>
    <div class="stat"><div class="num" id="s-tr">0</div><div class="lbl">В пути</div></div>
    <div class="stat"><div class="num" id="s-ar">0</div><div class="lbl">На складе</div></div>
    <div class="stat"><div class="num" id="s-is">0</div><div class="lbl">Выдано</div></div>
  </div>
  <div class="page-tabs">
    <button class="page-tab active" onclick="goPage('parcels',this)">📦 Посылки</button>
    <button class="page-tab" onclick="goPage('clients',this)">👥 Клиенты (153)</button>
  </div>

  <!-- PARCELS -->
  <div class="page active" id="page-parcels">
    <div class="sw">
      <div class="sbox"><span style="font-size:18px;opacity:.5">🔍</span>
        <input type="text" id="srch" placeholder="Трек, имя, телефон, код..." oninput="renderO()">
      </div>
      <button class="btn bg" onclick="document.getElementById('xlsxIn').click()">📥 Файл от китайца</button>
      <input type="file" id="xlsxIn" accept=".xlsx,.xls,.csv" style="display:none" onchange="importChinese(event)">
      <button class="btn by" onclick="openAdd()">➕ Добавить</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="ftabs">
        <button class="tab active" onclick="setF('all',this)">Все</button>
        <button class="tab" onclick="setF('transit',this)">В пути</button>
        <button class="tab" onclick="setF('arrived',this)">На складе</button>
        <button class="tab" onclick="setF('issued',this)">Выдано</button>
      </div>
      <span style="font-size:12px;color:var(--t2);margin-left:auto" id="clbl"></span>
    </div>
    <div class="tw">
      <table><thead><tr>
        <th>Трек-код</th><th>Клиент</th><th>Телефон</th><th>Вес</th><th>Сумма</th><th>Статус</th><th>Дата</th><th>Действие</th>
      </tr></thead>
      <tbody id="tbody"></tbody></table>
      <div class="empty" id="emptyO" style="display:none"><div class="icon">📭</div><p>Посылок не найдено</p></div>
    </div>
  </div>

  <!-- CLIENTS -->
  <div class="page" id="page-clients">
    <div class="sw">
      <div class="sbox"><span style="font-size:18px;opacity:.5">🔍</span>
        <input type="text" id="csrch" placeholder="Имя, телефон, код..." oninput="renderC()">
      </div>
    </div>
    <div class="cgrid" id="cgrid"></div>
    <div class="empty" id="emptyC" style="display:none"><div class="icon">👤</div><p>Клиентов не найдено</p></div>
  </div>
</main>

<!-- ADD -->
<div class="modal-bg" id="mAdd">
  <div class="modal">
    <div class="mt"><span>➕</span>Новая посылка</div>
    <div class="fg"><label>Трек-код *</label><input type="text" id="f-track" placeholder="Введи трек-код"></div>
    <div class="fr">
      <div class="fg"><label>Клиент *</label>
        <input type="text" id="f-name" placeholder="Имя клиента" oninput="autoFill()" list="dl1">
        <datalist id="dl1"></datalist>
      </div>
      <div class="fg"><label>Телефон</label><input type="text" id="f-phone" placeholder="+996..."></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Вес (кг)</label><input type="number" id="f-weight" placeholder="0.5" step="0.1" min="0"></div>
      <div class="fg"><label>Статус</label>
        <select id="f-status"><option value="transit">В пути</option><option value="arrived">На складе</option></select>
      </div>
    </div>
    <div class="fg"><label>Комментарий</label><input type="text" id="f-comment" placeholder="Хрупкое..."></div>
    <div class="ma">
      <button class="btn bgh" onclick="closeM('mAdd')">Отмена</button>
      <button class="btn by" onclick="addO()">Добавить</button>
    </div>
  </div>
</div>

<!-- EDIT -->
<div class="modal-bg" id="mEdit">
  <div class="modal">
    <div class="mt"><span>✏️</span>Редактировать</div>
    <div class="fg"><label>Трек-код</label><input type="text" id="e-track" disabled style="opacity:.6"></div>
    <div class="fr">
      <div class="fg"><label>Клиент</label><input type="text" id="e-name" list="dl2"><datalist id="dl2"></datalist></div>
      <div class="fg"><label>Телефон</label><input type="text" id="e-phone"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Вес (кг)</label><input type="number" id="e-weight" step="0.1" min="0"></div>
      <div class="fg"><label>Статус</label>
        <select id="e-status">
          <option value="transit">В пути</option>
          <option value="arrived">На складе</option>
          <option value="issued">Выдано</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>Комментарий</label><input type="text" id="e-comment"></div>
    <div class="ma">
      <button class="btn bgh" onclick="closeM('mEdit')">Отмена</button>
      <button class="btn by" onclick="saveEdit()">💾 Сохранить</button>
    </div>
  </div>
</div>

<!-- VIEW -->
<div class="modal-bg" id="mView">
  <div class="modal">
    <div class="mt"><span>📦</span>Посылка</div>
    <div id="viewContent"></div>
    <div class="ma">
      <button class="btn bgh" onclick="closeM('mView')">Закрыть</button>
      <button class="btn bg" id="issueBtn" onclick="issueO()">✅ Выдать клиенту</button>
    </div>
  </div>
</div>

<!-- WHATSAPP -->

  <div class="modal">
    <div class="mt">
      <span style="background:#25D366"><svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></span>
      WhatsApp
    </div>
    <div id="waTmpls" style="display:flex;flex-direction:column;gap:7px;margin-bottom:12px"></div>
    <div class="fg"><label>Текст сообщения</label>
      <textarea id="waText" rows="5" style="width:100%;padding:10px 12px;border:2px solid var(--gr);border-radius:9px;font-family:'Golos Text',sans-serif;font-size:13px;resize:vertical;outline:none;line-height:1.5"></textarea>
    </div>
    <div class="ma">
      <button class="btn bgh" onclick="closeM('mWA')">Отмена</button>
      <button class="btn" style="background:#25D366;color:#fff" onclick="openWA()">Открыть WhatsApp →</button>
    </div>
  </div>
</div>

<!-- IMPORT PREVIEW -->
<div class="modal-bg" id="mImport">
  <div class="modal" style="width:500px">
    <div class="mt"><span>📥</span>Трек-коды от китайца</div>
    <div id="importPrev" style="max-height:250px;overflow-y:auto;margin-bottom:10px"></div>
    <div id="importInfo" style="font-size:13px;color:var(--t2);margin-bottom:4px"></div>
    <div class="ma">
      <button class="btn bgh" onclick="closeM('mImport')">Отмена</button>
      <button class="btn by" onclick="confirmImport()">✅ Загрузить все</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

let filt = 'all', viewId = null, editId = null, waId = null, pendingTracks = [];
const SM = {transit:{l:'В пути',c:'bt'},arrived:{l:'На складе',c:'ba'},issued:{l:'Выдано',c:'bi'}};

function init(){
  updateStats(); renderO(); renderC(); buildDL();
  setInterval(()=>{ document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); },1000);
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

function buildDL(){
  const o = CLIENTS.map(c=>`<option value="${c.name}">`).join('');
  document.getElementById('dl1').innerHTML = o;
  document.getElementById('dl2').innerHTML = o;
}

function autoFill(){
  const n = document.getElementById('f-name').value;
  const c = CLIENTS.find(x=>x.name.toLowerCase()===n.toLowerCase());
  if(c && c.phone) document.getElementById('f-phone').value = c.phone;
}

function updateStats(){
  document.getElementById('s-all').textContent = orders.length;
  document.getElementById('s-tr').textContent = orders.filter(o=>o.status==='transit').length;
  document.getElementById('s-ar').textContent = orders.filter(o=>o.status==='arrived').length;
  document.getElementById('s-is').textContent = orders.filter(o=>o.status==='issued').length;
}

function goPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.page-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
}

function setF(f,el){
  filt=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderO();
}

function renderO(){
  const q=document.getElementById('srch').value.trim().toLowerCase();
  let list=orders;
  if(filt!=='all') list=list.filter(o=>o.status===filt);
  if(q) list=list.filter(o=>o.track.toLowerCase().includes(q)||o.name.toLowerCase().includes(q)||(o.phone||'').includes(q)||(o.code||'').toLowerCase().includes(q));
  document.getElementById('clbl').textContent=`Показано: ${list.length} из ${orders.length}`;

function waClient(phone,name){
  const p=phone.replace(/\D/g,'');
  const txt=encodeURIComponent(`Здравствуйте, ${name}! 👋\n\nQadam Cargo на связи.`);
  window.open(`https://wa.me/${p}?text=${txt}`,'_blank');
}

function openAdd(){
  ['f-track','f-name','f-phone','f-weight','f-comment'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-status').value='transit';
  openM('mAdd');
}

function addO(){
  const track=document.getElementById('f-track').value.trim().toUpperCase();
  const name=document.getElementById('f-name').value.trim();
  if(!track||!name){showN('⚠️ Заполните трек-код и имя!');return;}
  if(orders.find(o=>o.track===track)){showN('⚠️ Такой трек уже есть!');return;}
  const today=new Date().toISOString().split('T')[0];
  orders.unshift({id:Date.now(),track,code:'',name,phone:document.getElementById('f-phone').value.trim(),weight:parseFloat(document.getElementById('f-weight').value)||null,status:document.getElementById('f-status').value,date:today,comment:document.getElementById('f-comment').value.trim()});
  updateStats();renderO();closeM('mAdd');showN('✅ Посылка добавлена!');
}

// IMPORT FROM CHINESE
function importChinese(event){
  const file=event.target.files[0];if(!file)return;
  event.target.value='';
  const reader=new FileReader();
  if(file.name.endsWith('.csv')){reader.onload=e=>parseCSV(e.target.result);reader.readAsText(file,'UTF-8');}
  else{reader.onload=e=>parseXLSX(e.target.result);reader.readAsBinaryString(file);}
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const tracks=[];
  lines.forEach(line=>{
    const val=line.split(/[,;\t]/)[0].replace(/["\']/g,'').trim().toUpperCase();
    if(val&&val.length>=6) tracks.push(val);
  });
  showImportPreview(tracks);
}

function parseXLSX(binary){
  const tracks=[];const seen=new Set();
  // Extract from shared strings XML in xlsx zip
  const strMatch=binary.match(/xl\/sharedStrings\.xml[^\x00]*?<sst[\s\S]*?<\/sst>/);
  let shared=[];
  if(strMatch){
    const tMatches=strMatch[0].match(/<t[^>]*>([^<]*)<\/t>/g)||[];
    shared=tMatches.map(m=>m.replace(/<[^\/]*\/t>/g,'').replace(/<t[^>]*>/g,'').trim());
  }
  // Also try raw string extraction
  const allStrings=[...shared];
  const rawMatches=binary.match(/<t[^>]*>([^<]+)<\/t>/g)||[];
  rawMatches.forEach(m=>{const v=m.replace(/<[^>]+>/g,'').trim();if(v&&!allStrings.includes(v))allStrings.push(v);});
  
  allStrings.forEach(s=>{
    const clean=s.trim().toUpperCase();
    if(clean.length>=8&&clean.length<=35&&!seen.has(clean)&&
       ((/[A-Z]/.test(clean)&&/[0-9]/.test(clean))||/^\d{10,20}$/.test(clean))){
      seen.add(clean);tracks.push(clean);
    }
  });
  // Fallback: scan binary for digit sequences
  if(!tracks.length){
    const m2=binary.match(/\d{10,20}/g)||[];
    m2.forEach(m=>{if(!seen.has(m)){seen.add(m);tracks.push(m);}});
  }
  showImportPreview(tracks.slice(0,500));
}

let pendingImport=[];
function showImportPreview(tracks){
  const existing=new Set(orders.map(o=>o.track.toUpperCase()));
  const newT=tracks.filter(t=>!existing.has(t));
  const dupT=tracks.filter(t=>existing.has(t));
  pendingImport=newT;
  document.getElementById('importPrev').innerHTML=newT.slice(0,40).map(t=>
    `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gr)">
      <span style="font-family:'Unbounded',sans-serif;font-size:11px;color:var(--gd);font-weight:700">${t}</span>
      <span class="badge bt" style="margin-left:auto">В пути</span></div>`
  ).join('')+(newT.length>40?`<div style="padding:7px;color:var(--t2);font-size:13px">...и ещё ${newT.length-40}</div>`:'') ||
  '<div style="padding:20px;text-align:center;color:var(--t2)">Трек-коды не найдены</div>';
  document.getElementById('importInfo').innerHTML=
    `<b style="color:var(--gd)">${newT.length}</b> новых трек-кодов будет добавлено`+
    (dupT.length?` · <span style="color:var(--t2)">${dupT.length} уже есть — пропущены</span>`:'');
  openM('mImport');
}

function confirmImport(){
  if(!pendingImport.length){closeM('mImport');return;}
  const today=new Date().toISOString().split('T')[0];
  const newOrders=pendingImport.map(track=>{return {id:Date.now()+Math.random(),track,code:'',name:'',phone:'',weight:null,status:'transit',date:today,comment:''};});
  orders=[...newOrders,...orders];
  updateStats();renderO();closeM('mImport');
  showN(`✅ Загружено ${newOrders.length} трек-кодов! Теперь заполни имена клиентов.`);
  pendingImport=[];
}
